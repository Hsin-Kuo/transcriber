# EC2 Nginx 設定
# 靜態檔案直接提供，API 請求代理到後端

# Rate limiting zones
# api：通用 API，每 IP 60r/min burst 20
# auth：登入/註冊/忘記密碼，每 IP 3r/min burst 5（防暴力破解）
# upload：上傳啟動/完成，每 IP 10r/min burst 5（chunks/* 走 upload_chunks）
# upload_chunks：分片資料寫入，每 IP 120r/min burst 30
#   前端並行 3 條 × 約 3s/chunk ≈ 1 chunk/s 穩態，給 2× headroom
#   後端還有 user / global semaphore 做最後把關，nginx 這層只擋暴衝
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload_chunks:10m rate=120r/m;
# PDF 生成成本 1-2 秒 CPU + ~100MB transient RAM，比一般 API 高，獨立限流
limit_req_zone $binary_remote_addr zone=pdf:10m rate=10r/m;
# Webhook 從 Resend 等第三方固定 IP 推送，量可能爆量（一次大量 bounce / domain
# reputation 事件可能單分鐘 100+），用獨立寬鬆 zone 避免擋住合法事件
limit_req_zone $binary_remote_addr zone=webhook:10m rate=300r/m;
limit_req_status 429;

# 官網 soundlite.app（SoundLiteMain landing page）
server {
    listen 80;
    server_name soundlite.app;

    root /var/www/main;
    index index.html;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # 舊網域 app 路徑 301 導回 my.soundlite.app（過渡期相容）
    # 涵蓋：舊書籤、遷移前寄出的 email 驗證/重設信、舊 NewebPay return URL、
    #       舊分享連結 /s/{token}、舊 OAuth callback 等。
    # 沒這段這些 URL 會 fallback 到 landing 的 /index.html → SPA 不認 route 顯空白。
    # frontend router 完整路由：/all /settings /checkout /payment/return
    #                          /transcript/:id /login /register /verify-email
    #                          /forgot-password /reset-password /s/:token
    # /auth 走 API 也保險納入（舊 client 可能 hardcode）。
    location ~ ^/(all|settings|checkout|payment/|transcript/|login|register|verify-email|forgot-password|reset-password|s/|auth/) {
        return 301 https://my.soundlite.app$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    }
}

# Transcriber app my.soundlite.app
server {
    listen 80;
    server_name my.soundlite.app;

    root /var/www/transcriber;
    index index.html;

    client_max_body_size 500M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://*.googleusercontent.com https://js.stripe.com https://*.sentry.io https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://accounts.google.com https://api.stripe.com https://*.sentry.io https://*.ingest.sentry.io https://transcriber-files-696637902131.s3.amazonaws.com https://transcriber-files-696637902131.s3.ap-northeast-1.amazonaws.com https://cloudflareinsights.com; frame-src 'self' https://accounts.google.com https://js.stripe.com https://hooks.stripe.com https://*.newebpay.com; media-src 'self' blob: https://transcriber-files-696637902131.s3.amazonaws.com https://transcriber-files-696637902131.s3.ap-northeast-1.amazonaws.com; object-src 'none'; base-uri 'self'; form-action 'self' https://accounts.google.com https://*.newebpay.com https://core.newebpay.com" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # SSE 事件流端點
    location ~ ^/tasks/[^/]+/events {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
    }

    # Stripe webhook
    location = /subscriptions/webhook {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 藍新 notify webhook
    location ~ ^/subscriptions/notify/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Resend bounce / complaint webhook
    # client_max_body_size 限制：webhook payload 一般 < 4KB，給 64KB 容忍
    # 攻擊者用偽簽名 + 大 body 嘗試耗 RAM 也只能塞 64KB
    location = /webhooks/resend {
        client_max_body_size 64k;
        limit_req zone=webhook burst=50 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Token refresh
    location = /auth/refresh {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload chunks
    location ~ ^/uploads/[^/]+/chunks/ {
        limit_req zone=upload_chunks burst=30 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 認證敏感路徑
    location ~ ^/auth/(login|register|forgot-password|reset-password|verify-email|resend-verification) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上傳啟動/完成
    location ~ ^/uploads/(init|[^/]+/complete) {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # PDF / export 路徑單獨限流（必須在下面 generic api location 之前，
    # nginx regex location 第一個 match wins）
    location ~ ^/transcriptions/[^/]+/export/ {
        limit_req zone=pdf burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API 路由代理到後端
    location ~ ^/(auth|tasks|transcriptions|tags|audio|summaries|uploads|shared|subscriptions|health|readiness|webhooks) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 快取靜態資源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    }
}

# 管理後台 admin.soundlite.app
server {
    listen 80;
    server_name admin.soundlite.app;

    root /var/www/admin;
    index index.html;

    # 安全 headers（同主站，admin 介面更嚴格 referrer 設定）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    # CSP：admin 後台無 Stripe/OAuth，可更嚴格
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # Gzip 壓縮
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Admin 認證敏感路徑：嚴格限流
    location ~ ^/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 路由代理到後端（直接透傳，不改路徑）
    location ~ ^/(api|auth)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 快取靜態資源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # 重複 server 層的安全 headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    }
}
