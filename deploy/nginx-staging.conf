# EC2 Nginx 設定 — STAGING（staging.soundlite.app 單一入口）
#
# 與 prod nginx-ec2.conf 的差異：
#   - 單一 server block：staging.soundlite.app（prod 拆 landing/app/admin 三個）
#   - CSP 的 S3 connect-src/media-src 指向 staging bucket
#   - 不含 landing 的 my.→ 301 redirect、不含 admin server block（staging 不部 admin）
#   - 加 X-Robots-Tag: noindex（避免被搜尋引擎索引；Cloudflare Access 也擋，雙保險）
#
# TLS 終結在 Cloudflare（proxied），origin 聽 80，同 prod。
# 部署：deploy-staging.yml cp 到 /etc/nginx/conf.d/transcriber.conf。

# Rate limiting zones（staging 機器獨立一份；與 prod 在不同機器，不衝突）
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload_chunks:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=pdf:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=300r/m;
limit_req_status 429;

# Transcriber app（staging 單一入口）
server {
    listen 80;
    server_name staging.soundlite.app;

    root /var/www/transcriber;
    index index.html;

    client_max_body_size 500M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    # staging 不該被搜尋引擎索引
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://*.googleusercontent.com https://*.sentry.io https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://accounts.google.com https://*.sentry.io https://*.ingest.sentry.io https://transcriber-files-staging-696637902131.s3.amazonaws.com https://transcriber-files-staging-696637902131.s3.ap-northeast-1.amazonaws.com https://cloudflareinsights.com; frame-src 'self' https://accounts.google.com https://*.newebpay.com; media-src 'self' blob: https://transcriber-files-staging-696637902131.s3.amazonaws.com https://transcriber-files-staging-696637902131.s3.ap-northeast-1.amazonaws.com; object-src 'none'; base-uri 'self'; form-action 'self' https://accounts.google.com https://*.newebpay.com https://core.newebpay.com" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # SSE 事件流端點
    location ~ ^/tasks/[^/]+/events {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
    }

    # 藍新 notify webhook
    location ~ ^/subscriptions/notify/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Resend bounce / complaint webhook
    location = /webhooks/resend {
        client_max_body_size 64k;
        limit_req zone=webhook burst=50 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Token refresh
    location = /auth/refresh {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload chunks
    location ~ ^/uploads/[^/]+/chunks/ {
        limit_req zone=upload_chunks burst=30 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 認證敏感路徑
    location ~ ^/auth/(login|register|forgot-password|reset-password|verify-email|resend-verification) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上傳啟動/完成
    location ~ ^/uploads/(init|[^/]+/complete) {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # PDF / export 路徑單獨限流（須在 generic api location 之前）
    location ~ ^/transcriptions/[^/]+/export/ {
        limit_req zone=pdf burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API 路由代理到後端
    location ~ ^/(auth|tasks|transcriptions|tags|audio|summaries|uploads|shared|subscriptions|health|readiness|webhooks) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 快取靜態資源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}

# 管理後台 admin-staging.soundlite.app
# 對應 prod nginx-ec2.conf 的 admin.soundlite.app block；差異：
#   - server_name 改 staging admin 網域
#   - 加 X-Robots-Tag: noindex（同 staging 主站；Cloudflare Access 也擋，雙保險）
# 高權限面：Cloudflare Access 必須蓋住此網域（admin API 能改配額 / 看 audit log）。
server {
    listen 80;
    server_name admin-staging.soundlite.app;

    root /var/www/admin;
    index index.html;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    # CSP：admin 後台無金流/OAuth，可更嚴格（同 prod admin block）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Admin 認證敏感路徑：嚴格限流
    location ~ ^/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 路由代理到後端（直接透傳，不改路徑）
    location ~ ^/(api|auth)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 快取靜態資源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
