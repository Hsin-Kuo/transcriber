name: Deploy to AWS

on:
  push:
    branches:
      - aws

env:
  EC2_HOST: 3.112.209.96
  EC2_USER: ec2-user

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ===== Backend 部署 =====
      - name: Package backend
        run: |
          tar --exclude='node_modules' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.env' \
              --exclude='uploads' \
              --exclude='audio_files' \
              --exclude='dist' \
              --exclude='.venv' \
              --exclude='venv' \
              --exclude='frontend' \
              --exclude='admin-frontend' \
              --exclude='.git' \
              -czvf backend.tar.gz \
              src deploy requirements-web.txt requirements.txt

      # ===== Frontend 部署 =====
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ""
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          echo "VITE_API_URL=" > .env.production
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env.production
          npm run build

      - name: Package frontend
        working-directory: frontend
        run: tar -czvf ../frontend.tar.gz dist

      # ===== SSH 部署 =====
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/transcriber-key.pem
          chmod 600 ~/.ssh/transcriber-key.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload packages to EC2
        run: |
          scp -i ~/.ssh/transcriber-key.pem backend.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/
          scp -i ~/.ssh/transcriber-key.pem frontend.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/transcriber-key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'ENDSSH'
          echo "=== Deploying Backend ==="
          cd /opt/transcriber
          tar -xzf /tmp/backend.tar.gz

          # 安裝新的依賴（如果有）
          python3.11 -m pip install --user -r requirements-web.txt -q

          # 重啟服務
          sudo systemctl restart transcriber

          echo "=== Backend deployed ==="
          ENDSSH

      - name: Deploy frontend
        run: |
          ssh -i ~/.ssh/transcriber-key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'ENDSSH'
          echo "=== Deploying Frontend ==="
          cd /tmp
          tar -xzf frontend.tar.gz
          sudo rm -rf /var/www/transcriber/*
          sudo cp -r dist/* /var/www/transcriber/
          sudo chown -R nginx:nginx /var/www/transcriber

          echo "=== Frontend deployed ==="
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 5
          curl -f https://soundlite.app/health || exit 1
          echo "✅ Deployment successful! https://soundlite.app"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/transcriber-key.pem
