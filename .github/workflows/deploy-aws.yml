name: Deploy to AWS

on:
  push:
    branches:
      - aws

env:
  EC2_HOST: 3.112.209.96
  EC2_USER: ec2-user

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ===== Backend 打包 =====
      - name: Package backend
        run: |
          tar --exclude='node_modules' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.env' \
              --exclude='uploads' \
              --exclude='audio_files' \
              --exclude='dist' \
              --exclude='.venv' \
              --exclude='venv' \
              --exclude='frontend' \
              --exclude='admin-frontend' \
              --exclude='.git' \
              -czvf backend.tar.gz \
              src deploy requirements-web.txt requirements.txt

      # ===== 前端原始碼打包（EC2 上用 Docker 建置）=====
      - name: Package frontend source
        run: |
          tar --exclude='node_modules' \
              --exclude='dist' \
              -czvf frontend-src.tar.gz frontend

      - name: Package admin-frontend source
        run: |
          tar --exclude='node_modules' \
              --exclude='dist' \
              -czvf admin-frontend-src.tar.gz admin-frontend

      # ===== SSH 部署 =====
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/transcriber-key.pem
          chmod 600 ~/.ssh/transcriber-key.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload packages to EC2
        run: |
          scp -i ~/.ssh/transcriber-key.pem backend.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/
          scp -i ~/.ssh/transcriber-key.pem frontend-src.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/
          scp -i ~/.ssh/transcriber-key.pem admin-frontend-src.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/transcriber-key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'ENDSSH'
          echo "=== Deploying Backend ==="
          cd /opt/transcriber
          tar -xzf /tmp/backend.tar.gz

          # 安裝新的依賴（如果有）
          python3.11 -m pip install --user -r requirements-web.txt -q

          # 更新 Nginx 反向代理設定
          sudo cp /opt/transcriber/deploy/nginx-ec2.conf /etc/nginx/conf.d/transcriber.conf
          sudo nginx -t && sudo systemctl reload nginx

          # 重啟後端服務
          sudo systemctl restart transcriber

          echo "=== Backend deployed ==="
          ENDSSH

      - name: Deploy frontend
        run: |
          ssh -i ~/.ssh/transcriber-key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'ENDSSH'
          echo "=== Deploying Frontend ==="
          cd /opt/transcriber
          tar -xzf /tmp/frontend-src.tar.gz

          # 重建 Docker 映像並重啟容器
          sudo docker build -t transcriber-frontend ./frontend
          sudo docker rm -f whisper-frontend 2>/dev/null || true
          sudo docker run -d \
              --name whisper-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              -e API_UPSTREAM=172.17.0.1:8000 \
              transcriber-frontend

          echo "=== Frontend deployed ==="
          ENDSSH

      - name: Deploy admin-frontend
        run: |
          ssh -i ~/.ssh/transcriber-key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'ENDSSH'
          echo "=== Deploying Admin Frontend ==="
          cd /opt/transcriber
          tar -xzf /tmp/admin-frontend-src.tar.gz

          # 重建 Docker 映像並重啟容器
          sudo docker build -t transcriber-admin ./admin-frontend
          sudo docker rm -f whisper-admin-frontend 2>/dev/null || true
          sudo docker run -d \
              --name whisper-admin-frontend \
              --restart unless-stopped \
              -p 3003:3003 \
              -e API_UPSTREAM=172.17.0.1:8000 \
              transcriber-admin

          echo "=== Admin Frontend deployed ==="
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 5
          curl -f https://soundlite.app/health || exit 1
          echo "✅ Deployment successful! https://soundlite.app"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/transcriber-key.pem
