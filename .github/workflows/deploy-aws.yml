name: Deploy to AWS

on:
  push:
    branches:
      - aws

env:
  EC2_HOST: 3.112.209.96
  EC2_USER: ec2-user

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ===== Backend 打包 =====
      - name: Package backend
        run: |
          tar --exclude='node_modules' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.env' \
              --exclude='uploads' \
              --exclude='audio_files' \
              --exclude='dist' \
              --exclude='.venv' \
              --exclude='venv' \
              --exclude='frontend' \
              --exclude='admin-frontend' \
              --exclude='.git' \
              -czvf backend.tar.gz \
              src scripts deploy requirements-web.txt requirements.txt

      # ===== Frontend 建置 =====
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          # 寫入 .env.production（會覆寫 repo 內的同名檔，所有需要的變數都要列出）
          # VITE_API_URL 留空 → 前端 fallback 為 same-origin，由 nginx 反代到 :8000。
          # 切勿在 job env: 段落再設一份，shell env 會覆蓋 .env.production，
          # 過去因此 hardcode 成舊網域導致 my.soundlite.app 被 CSP 擋 cross-origin。
          cat > .env.production <<EOF
          VITE_API_URL=
          VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT=production
          VITE_SENTRY_TRACES_SAMPLE_RATE=0.1
          VITE_SENTRY_RELEASE=${{ github.sha }}
          VITE_BACKEND_PDF_ENABLED=true
          EOF
          npm ci
          npm run build

      - name: Package frontend
        working-directory: frontend
        run: tar -czvf ../frontend.tar.gz dist

      # ===== Admin Frontend 建置 =====
      - name: Build admin-frontend
        working-directory: admin-frontend
        run: |
          # admin-frontend/.env.production 在 .gitignore，由 CI 從 secrets 產生
          cat > .env.production <<EOF
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN_ADMIN }}
          VITE_SENTRY_ENVIRONMENT=production-admin
          VITE_SENTRY_TRACES_SAMPLE_RATE=0.1
          VITE_SENTRY_RELEASE=${{ github.sha }}
          EOF
          npm ci
          npm run build

      - name: Package admin-frontend
        working-directory: admin-frontend
        run: tar -czvf ../admin-frontend.tar.gz dist

      # ===== SSH 部署 =====
      # 用 ssh-agent 把 key 載入 agent 記憶體，不落地 disk
      # 比 echo > .pem 安全：runner 暫存 / log / 殘留檔案都不會看到 key 內容
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555  # v0.10.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host key
        run: ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload packages to EC2
        env:
          SHA: ${{ github.sha }}
        run: |
          scp backend.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/backend-${SHA}.tar.gz
          scp frontend.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/frontend-${SHA}.tar.gz
          scp admin-frontend.tar.gz ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/admin-frontend-${SHA}.tar.gz

      - name: Deploy backend
        env:
          SHA: ${{ github.sha }}
        run: |
          ssh ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "SHA=${SHA} bash -s" << 'ENDSSH'
          set -e
          echo "=== Deploying Backend [${SHA}] ==="
          # 保留釋出檔到 releases/，供 rollback.sh 使用
          sudo mkdir -p /opt/transcriber/releases
          sudo mv /tmp/backend-${SHA}.tar.gz /opt/transcriber/releases/
          sudo chown ec2-user:ec2-user /opt/transcriber/releases/backend-${SHA}.tar.gz

          cd /opt/transcriber
          tar -xzf /opt/transcriber/releases/backend-${SHA}.tar.gz

          python3.11 -m pip install --user -r requirements-web.txt -q

          # 更新 Nginx 設定
          sudo cp /opt/transcriber/deploy/nginx-ec2.conf /etc/nginx/conf.d/transcriber.conf
          sudo rm -f /etc/nginx/conf.d/default.conf
          sudo nginx -t && sudo systemctl reload nginx

          # Sync .env from canonical deploy/.env.aws（帶 timestamp backup）
          # 之後 .env 變更直接改 repo 的 deploy/.env.aws，push 就會生效。
          if [ -f /opt/transcriber/.env ]; then
              sudo cp /opt/transcriber/.env /opt/transcriber/.env.bak.${SHA}
          fi
          sudo cp /opt/transcriber/deploy/.env.aws /opt/transcriber/.env
          sudo chown ec2-user:ec2-user /opt/transcriber/.env
          sudo chmod 600 /opt/transcriber/.env
          # 只保留最近 5 份 .env backup
          ls -1t /opt/transcriber/.env.bak.* 2>/dev/null | tail -n +6 | xargs -r sudo rm -f

          # Sync systemd unit from canonical deploy/transcriber.service
          # 包含 --workers 2 + ExecStartPre cleanup（避免 worker startup pkill race）
          # systemd-analyze verify 擋住語法錯誤的 unit 部署
          sudo cp /opt/transcriber/deploy/transcriber.service /etc/systemd/system/transcriber.service
          # 確保 ExecStartPre 腳本可執行（tar 通常會保留 +x，保險起見補 chmod）
          chmod +x /opt/transcriber/deploy/pre-start-cleanup.sh
          sudo systemd-analyze verify /etc/systemd/system/transcriber.service
          sudo systemctl daemon-reload

          sudo systemctl restart transcriber
          # 等 service 真的進到 active 狀態（systemctl restart 是同步、但快速 fail 也可能會看到 activating）
          sleep 3
          sudo systemctl is-active --quiet transcriber || {
              echo "[ERROR] transcriber service not active after restart"
              sudo systemctl status transcriber --no-pager | head -30
              sudo journalctl -u transcriber -n 30 --no-pager
              exit 1
          }

          # 安裝/更新 rollback 腳本到固定位置（即使本次部署壞掉，rollback 仍可用）
          sudo install -m 0755 /opt/transcriber/deploy/rollback.sh /usr/local/bin/transcriber-rollback

          # 紀錄當前版本，清理舊釋出（保留最近 5 個 backend/frontend/admin-frontend）
          echo "${SHA}" | sudo tee /opt/transcriber/releases/CURRENT > /dev/null
          for prefix in backend frontend admin-frontend; do
            ls -1t /opt/transcriber/releases/${prefix}-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r sudo rm -f
          done
          echo "=== Backend deployed [${SHA}] ==="
          ENDSSH

      - name: Deploy frontend
        env:
          SHA: ${{ github.sha }}
        run: |
          ssh ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "SHA=${SHA} bash -s" << 'ENDSSH'
          set -e
          echo "=== Deploying Frontend [${SHA}] ==="
          sudo mkdir -p /opt/transcriber/releases
          sudo mv /tmp/frontend-${SHA}.tar.gz /opt/transcriber/releases/
          sudo chown ec2-user:ec2-user /opt/transcriber/releases/frontend-${SHA}.tar.gz

          cd /tmp
          tar -xzf /opt/transcriber/releases/frontend-${SHA}.tar.gz
          sudo mkdir -p /var/www/transcriber
          sudo rm -rf /var/www/transcriber/*
          sudo cp -r dist/* /var/www/transcriber/
          sudo chown -R nginx:nginx /var/www/transcriber
          rm -rf /tmp/dist
          echo "=== Frontend deployed [${SHA}] ==="
          ENDSSH

      - name: Deploy admin-frontend
        env:
          SHA: ${{ github.sha }}
        run: |
          ssh ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "SHA=${SHA} bash -s" << 'ENDSSH'
          set -e
          echo "=== Deploying Admin Frontend [${SHA}] ==="
          sudo mkdir -p /opt/transcriber/releases
          sudo mv /tmp/admin-frontend-${SHA}.tar.gz /opt/transcriber/releases/
          sudo chown ec2-user:ec2-user /opt/transcriber/releases/admin-frontend-${SHA}.tar.gz

          cd /tmp
          tar -xzf /opt/transcriber/releases/admin-frontend-${SHA}.tar.gz
          sudo mkdir -p /var/www/admin
          sudo rm -rf /var/www/admin/*
          sudo cp -r dist/* /var/www/admin/
          sudo chown -R nginx:nginx /var/www/admin
          rm -rf /tmp/dist
          echo "=== Admin Frontend deployed [${SHA}] ==="
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 5
          curl -f https://my.soundlite.app/health || exit 1
          echo "✅ Deployment successful! https://my.soundlite.app"
