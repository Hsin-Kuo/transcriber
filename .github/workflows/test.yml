name: Test

on:
  pull_request:
    branches:
      - main
      - aws
  push:
    branches:
      - main

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install 'ruff>=0.6'
      - name: Lint
        run: ruff check src/ tests/

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements-web.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        env:
          # 測試需要有效 JWT secret 才能 import jwt_handler
          JWT_SECRET_KEY: a3f2c1b8e4d6a9f5c2b8e1d4a6f9c3b2e5d8a1f4c7b6e3d2a5f8c1b4e7d6a9f2
          DEPLOY_ENV: local
        run: pytest tests/ -v

  nginx-conf:
    name: Nginx conf 文法
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - name: Validate nginx-ec2.conf
        run: |
          docker run --rm \
            -v "$PWD/deploy/nginx-ec2.conf:/etc/nginx/conf.d/test.conf:ro" \
            nginx:alpine nginx -t
