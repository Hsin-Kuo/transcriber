name: Test

on:
  pull_request:
    branches:
      - main
      - aws
  push:
    branches:
      - main

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install 'ruff>=0.6'
      - name: Lint
        run: ruff check src/ tests/

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements-web.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        env:
          # 測試需要有效 JWT secret 才能 import jwt_handler
          JWT_SECRET_KEY: a3f2c1b8e4d6a9f5c2b8e1d4a6f9c3b2e5d8a1f4c7b6e3d2a5f8c1b4e7d6a9f2
          DEPLOY_ENV: local
          # 顯式鎖定 console 避免未來 import src.main 觸發 startup_event 對
          # EMAIL_PROVIDER=resend 缺密鑰 fail-fast
          EMAIL_PROVIDER: console
        run: pytest tests/ -v

  nginx-conf:
    name: Nginx conf 文法
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Validate nginx-ec2.conf
        run: |
          docker run --rm \
            -v "$PWD/deploy/nginx-ec2.conf:/etc/nginx/conf.d/test.conf:ro" \
            nginx:alpine nginx -t

  frontend-lint:
    name: Frontend ESLint + type-check + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [frontend, admin-frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - name: Install
        working-directory: ${{ matrix.package }}
        run: npm ci
      - name: ESLint
        working-directory: ${{ matrix.package }}
        run: npm run lint
      - name: Type-check
        working-directory: ${{ matrix.package }}
        run: npm run type-check
      # --if-present 讓 admin-frontend（目前無 test script）靜默跳過,
      # 等 admin 也加 vitest 後不用改 CI 即自動生效
      - name: Test
        working-directory: ${{ matrix.package }}
        run: npm run test --if-present
