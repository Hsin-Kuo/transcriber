# Dependabot 設定。
#
# Actions 釘 SHA 的代價是手動更新，這個檔讓 dependabot 每週自動開 PR 更新。
# 開 PR 走 CI（test.yml）驗證，merge 後新 SHA 生效。
version: 2
updates:
  # GitHub Actions（pinned SHA → 自動 PR 更新到新版 tag 的 SHA）
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Python 後端
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # 主前端
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
      # 以下是 major bump 群組，按生態系切分，避免一票 PR 同時開。
      # Dependabot 按順序匹配，每個套件只進第一個命中的 group。
      typescript-major:
        patterns:
          - "typescript"
          - "vue-tsc"
        update-types:
          - major
      eslint-major:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "eslint-config-*"
        update-types:
          - major
      vue-major:
        patterns:
          - "vue"
          - "@vue/*"
          - "vue-i18n"
          - "vue-router"
          - "pinia"
        update-types:
          - major
      vite-major:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
        update-types:
          - major

  # 管理後台
  - package-ecosystem: npm
    directory: "/admin-frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
      typescript-major:
        patterns:
          - "typescript"
          - "vue-tsc"
        update-types:
          - major
      eslint-major:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "eslint-config-*"
        update-types:
          - major
      vue-major:
        patterns:
          - "vue"
          - "@vue/*"
          - "vue-i18n"
          - "vue-router"
          - "pinia"
        update-types:
          - major
      vite-major:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
        update-types:
          - major
