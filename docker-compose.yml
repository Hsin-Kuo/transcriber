version: '3.8'

services:
  # MongoDB 資料庫
  mongodb:
    image: mongo:7.0
    container_name: whisper-mongodb
    ports:
      - "27020:27017"  # 使用 27020 避免端口衝突
    volumes:
      - whisper_mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=whisper_transcriber
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/whisper_transcriber --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # 前端 Web 介面
  frontend:
    build: ./frontend
    container_name: whisper-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      # API_UPSTREAM 控制 Nginx 反代目標
      # macOS: host.docker.internal:8000 (預設)
      # Linux/EC2: 172.17.0.1:8000
      - API_UPSTREAM=host.docker.internal:8000
    depends_on:
      - mongodb

  # 管理後台前端
  admin-frontend:
    build: ./admin-frontend
    container_name: whisper-admin-frontend
    ports:
      - "3003:3003"
    restart: unless-stopped
    environment:
      - API_UPSTREAM=host.docker.internal:8000
    depends_on:
      - mongodb

volumes:
  whisper_mongo_data:
