version: '3.8'

# Plan B: 僅運行前端容器，後端在本地原生運行
# 用法：docker-compose -f docker-compose.frontend-only.yml up

services:
  # 前端 Web 介面
  frontend:
    build: ./frontend
    container_name: whisper-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      # API_UPSTREAM 控制 Nginx 反代目標
      # macOS: host.docker.internal:8000 (預設)
      # Linux/EC2: 172.17.0.1:8000
      - API_UPSTREAM=host.docker.internal:8000
