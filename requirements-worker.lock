# GPU Worker 依賴鎖定檔（完整 transitive closure，deterministic 重建用）
#
# 來源：2026-06-14 在乾淨重建並驗證過的 staging GPU worker 上 `pip freeze --user`
#       （DLAMI base GPU AMI + python3.12；當時 whisper + diarization 皆載入成功）。
# 用途：deploy-gpu-worker.sh 與 transcriber-worker.service 的 ExecStartPre 用此檔
#       `pip install -r requirements-worker.lock`，確保 worker 重建拿到一模一樣的版本，
#       不受 requirements.txt 未釘的 transitive（numpy/tokenizers/av/lightning…）漂移影響。
#
# 關係：requirements.txt 是「想要什麼」（human-readable，含關鍵釘選 + 註解）；
#       本檔是「實際解析出的完整版本」（machine lock）。兩者搭配 .in/.lock 模式。
#
# ⚠️ 重新產生時機：當你「故意」升級 requirements.txt 的任何套件後，需在一台乾淨
#    worker 上重跑 `pip install -r requirements.txt` → `pip freeze --user` 覆蓋本檔。
#    勿手改個別版本（會破壞 closure 一致性）。
